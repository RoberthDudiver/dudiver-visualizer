name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write          # Requerido por SignPath

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download FFmpeg
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip -offmpeg_extract
          copy ffmpeg_extract\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe ffmpeg.exe
          copy ffmpeg_extract\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe ffprobe.exe
        shell: cmd

      - name: Build EXE
        run: |
          pyinstaller --noconfirm "Dudiver Visualizer.spec"
        shell: cmd

      - name: Verify EXE exists
        run: |
          if not exist dist\DudiverVisualizer.exe (
            echo ERROR: EXE not found!
            exit /b 1
          )
          dir dist\DudiverVisualizer.exe
        shell: cmd

      - name: Create Inno Setup Script
        run: |
          @"
          [Setup]
          AppName=Dudiver Visualizer Studio
          AppVersion=3.0
          AppPublisher=Dudiver
          AppPublisherURL=https://github.com/RoberthDudiver
          AppSupportURL=https://github.com/RoberthDudiver/Dudiver-Visualizer-Studio/issues
          DefaultDirName={autopf}\Dudiver Visualizer Studio
          DefaultGroupName=Dudiver Visualizer Studio
          OutputDir=installer
          OutputBaseFilename=DudiverVisualizerSetup
          SetupIconFile=icon.ico
          Compression=lzma2
          SolidCompression=yes
          UninstallDisplayIcon={app}\DudiverVisualizer.exe
          WizardStyle=modern
          PrivilegesRequired=lowest
          LicenseFile=LICENSE

          [Languages]
          Name: "spanish"; MessagesFile: "compiler:Languages\Spanish.isl"
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"

          [Files]
          Source: "dist\DudiverVisualizer.exe"; DestDir: "{app}"; Flags: ignoreversion
          Source: "ffmpeg.exe"; DestDir: "{app}"; Flags: ignoreversion
          Source: "ffprobe.exe"; DestDir: "{app}"; Flags: ignoreversion
          Source: "icon.ico"; DestDir: "{app}"; Flags: ignoreversion
          Source: "LICENSE"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\Dudiver Visualizer Studio"; Filename: "{app}\DudiverVisualizer.exe"; IconFilename: "{app}\icon.ico"
          Name: "{group}\Desinstalar Dudiver Visualizer"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\Dudiver Visualizer Studio"; Filename: "{app}\DudiverVisualizer.exe"; IconFilename: "{app}\icon.ico"; Tasks: desktopicon

          [Run]
          Filename: "{app}\DudiverVisualizer.exe"; Description: "Abrir Dudiver Visualizer Studio"; Flags: nowait postinstall skipifsilent
          "@ | Out-File -FilePath setup.iss -Encoding ASCII
        shell: pwsh

      - name: Build Installer
        run: |
          mkdir installer
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" setup.iss
        shell: pwsh

      # ── Firma digital con SignPath (gratis para open source) ──
      - name: Sign EXE with SignPath
        if: startsWith(github.ref, 'refs/tags/')
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'dudiver-visualizer'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'initial'

          input-artifact-path: 'dist/DudiverVisualizer.exe'
          output-artifact-path: 'dist/DudiverVisualizer.exe'
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 300

      - name: Sign Installer with SignPath
        if: startsWith(github.ref, 'refs/tags/')
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'dudiver-visualizer'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'initial'

          input-artifact-path: 'installer/DudiverVisualizerSetup.exe'
          output-artifact-path: 'installer/DudiverVisualizerSetup.exe'
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 300

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: DudiverVisualizer-exe
          path: dist/DudiverVisualizer.exe

      - name: Upload Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DudiverVisualizer-installer
          path: installer/DudiverVisualizerSetup.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Dudiver Visualizer Studio ${{ github.ref_name }}"
          body: |
            ## Dudiver Visualizer Studio ${{ github.ref_name }}

            ### Descargar / Download
            - **DudiverVisualizerSetup.exe** — Instalador completo (incluye FFmpeg) ✅ Firmado
            - **DudiverVisualizer.exe** — Portable (requiere FFmpeg instalado) ✅ Firmado

            ### Incluido / Included
            - Aplicación completa con todas las dependencias
            - FFmpeg embebido (en el instalador)
            - Soporte Karaoke + Kinetic Typography
            - 9 estilos de animación
            - Generación de QR con logos de plataformas
            - Certificado digital (sin advertencia de Windows SmartScreen)

            ### Requisitos / Requirements
            - Windows 10/11

            ### Opcional / Optional
            - [Whisper](https://github.com/openai/whisper) — para sincronización automática con IA
            - `pip install openai-whisper` desde terminal

            ---
            **Open Source** — MIT License
          files: |
            dist/DudiverVisualizer.exe
            installer/DudiverVisualizerSetup.exe
          draft: false
          prerelease: false
